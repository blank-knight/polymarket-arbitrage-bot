# LLM Agent Trading Bot Configuration

# 交易配置
trading:
  enabled: true
  max_position_size: 100  # USDC
  min_profit_margin: 0.02  # 2%
  max_open_positions: 10
  stop_loss_percentage: 0.1  # 10%止损
  max_daily_loss: 50  # 每日最大亏损
  enable_auto_trade: false  # 是否自动执行交易

# Agent配置
agents:
  market_scout:
    enabled: true
    scan_interval: 60  # 秒
    max_markets: 50
    min_volume: 1000  # 最小24h成交量

  llm_analyst:
    enabled: true
    model: "nvidia/nemotron-nano-9b-v2:free"  # OpenRouter模型
    max_analysis_time: 30  # 秒
    temperature: 0.3  # 低温度，更确定

  strategy_executor:
    enabled: true
    auto_execute: false  # 是否自动执行交易
    confirm_before_trade: true
    max_concurrent_trades: 3

  risk_manager:
    enabled: true
    monitor_interval: 10  # 秒
    auto_stop_loss: true
    max_position_percentage: 0.3  # 单个仓位不超过总资金的30%

  trade_logger:
    enabled: true
    log_to_csv: true
    log_to_db: true
    generate_daily_report: true

# 策略配置
strategies:
  liquidity_absorption:
    enabled: true
    threshold: 0.4
    flip_time_window: 60  # 秒

  orderbook_arbitrage:
    enabled: true
    spread_threshold: 0.05
    min_profit_after_fees: 0.02

  structural_spread:
    enabled: true
    spread_threshold: 0.05

  no_farming:
    enabled: true
    weight: 0.7  # NO押注权重

  long_tail:
    enabled: true
    threshold: 0.05
    trade_size: 0.01

  spread_farming:
    enabled: true
    min_probability: 0.9
    trade_size: 0.05

  high_prob:
    enabled: true
    threshold: 0.9
    trade_size: 0.1

# Polymarket配置
polymarket:
  gamma_api_url: "https://gamma-api.polymarket.com"
  clob_api_url: "https://clob.polymarket.com"
  chainstack_node: ""  # 从环境变量读取
  chain_id: 137  # Polygon mainnet

# 数据库配置
database:
  markets_db: "database/markets.db"
  trades_db: "database/trades.db"
  agent_state_db: "database/agent_state.db"

# LLM配置
llm:
  provider: "openrouter"  # openrouter或custom
  api_key: ""  # 从环境变量读取
  model: "nvidia/nemotron-nano-9b-v2:free"
  max_tokens: 1000
  timeout: 30

# 日志配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/trading_bot.log"
  max_size_mb: 10
  backup_count: 5

# OpenClaw集成
openclaw:
  enabled: true
  skill_path: "~/.openclaw/skills/llm-agent-trading"
  workspace_path: "~/.openclaw/workspaces/llm-agent-trading"
